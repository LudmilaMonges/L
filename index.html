<!DOCTYPE html>
<html lang="es">
<head>
    <div>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<div class="card">
  <img src="agui.jpg" alt="Producto">
  <h1>aguila poderosa</h1>
  <p class="price">$5.000</p>
  <button>Añadir al carrito </button>
</div>

    <title>Document</title>
    



<style>
  .card {
    border: 1px solid #ffffff;
    border-radius: 8px;
    padding: 20px;
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: sans-serif;
  }
  button {
    background-color: #a72828;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    border-radius: 4px;
  }
</style>
<p>Clicks: <span id="contador">0</span></p>
<button id="btn">Aumentar</button>

<script>
  const display = document.getElementById('contador');
  const boton = document.getElementById('btn');
  let cuenta = 0;

  boton.addEventListener('click', () => {
    cuenta++;
    display.textContent = cuenta;
  });
</script>
<button id="toggleTheme">Cambiar Modo</button>

<style>
  body { transition: 0.3s; }
  .dark-mode { background-color: #3b3b3b; color: #fff; }
</style>

<script>
  const btnTheme = document.getElementById('toggleTheme');
  btnTheme.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
  });
</script>

<input type="text" id="nombre" placeholder="Tu nombre">
<button id="validar">Enviar</button>
<p id="error" style="color: red;"></p>

<script>
  const inputNom = document.getElementById('nombre');
  const btnVal = document.getElementById('validar');
  const txtError = document.getElementById('error');

  btnVal.addEventListener('click', () => {
    if (inputNom.value.trim() === "") {
      txtError.textContent = "Por favor, escribe un nombre.";
    } else {
      txtError.textContent = "";
      alert("Haz enviado tu nombre! Vuelva pronto");
    }
  });
</script>
<input type="text" id="tareaInput" placeholder="Nueva tarea">
<button id="addBtn">Agregar</button>
<ul id="lista"></ul>

<script>
  const input = document.getElementById('tareaInput');
  const lista = document.getElementById('lista');
  const btnAdd = document.getElementById('addBtn');

  btnAdd.addEventListener('click', () => {
    if (input.value !== "") {
      const nuevaTarea = document.createElement('li');
      nuevaTarea.textContent = input.value;
      lista.appendChild(nuevaTarea);
      input.value = ""; // Limpiar input
    }
  });
</script>
</head>
<body>
    <style>
  .card {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
    width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: sans-serif;
  }
  button {
    background-color: #a72828;
    color: rgb(255, 237, 237);
    border: none;
    padding: 10px;
    cursor: pointer;
    border-radius: 4px;
  }
</style>
</body>
</html>
